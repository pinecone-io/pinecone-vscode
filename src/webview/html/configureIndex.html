<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource}; script-src 'nonce-${nonce}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="${stylesUri}" rel="stylesheet">
    <title>Configure Index</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Configure Index: <span id="index-name">${indexName}</span></h2>
        </div>

        <section class="card">
            <div class="form-group">
                <label for="deletion-protection">Deletion Protection</label>
                <select id="deletion-protection">
                    <option value="disabled">Disabled</option>
                    <option value="enabled">Enabled</option>
                </select>
            </div>
        </section>

        <section class="card">
            <h3>Read Capacity</h3>
            <p class="hint" id="read-capacity-hint">Use OnDemand or configure Dedicated Read Nodes for BYOV indexes.</p>
            <div class="form-group">
                <label for="read-capacity-mode">Mode</label>
                <select id="read-capacity-mode">
                    <option value="OnDemand">OnDemand</option>
                    <option value="Dedicated">Dedicated</option>
                </select>
            </div>
            <div id="dedicated-read-capacity" class="hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label for="read-capacity-node-type">Node Type</label>
                        <select id="read-capacity-node-type">
                            <option value="b1">b1</option>
                            <option value="t1">t1</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="read-capacity-replicas">Replicas</label>
                        <input id="read-capacity-replicas" type="number" min="1" step="1" value="1">
                    </div>
                    <div class="form-group">
                        <label for="read-capacity-shards">Shards</label>
                        <input id="read-capacity-shards" type="number" min="1" step="1" value="1">
                    </div>
                </div>
            </div>
        </section>

        <section class="card">
            <h3>Tags</h3>
            <p class="hint">Add, remove, or update tags. Duplicate keys are not allowed.</p>
            <div id="tags-list"></div>
            <button id="add-tag-btn" type="button" class="secondary">Add Tag</button>
        </section>

        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>

        <div class="actions">
            <button id="save-btn">Save Configuration</button>
        </div>
    </div>
    <script nonce="${nonce}" src="${scriptUri}"></script>
</body>
</html>
