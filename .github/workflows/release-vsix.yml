name: Release VSIX

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-vsix-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npx @vscode/vsce package

      - name: Rename VSIX for release tag
        id: rename
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SOURCE_VSIX="$(ls -1 *.vsix | head -n 1)"
          TARGET_VSIX="pinecone-vscode-${VERSION}.vsix"
          mv "${SOURCE_VSIX}" "${TARGET_VSIX}"
          echo "vsix_name=${TARGET_VSIX}" >> "$GITHUB_OUTPUT"

      - name: Attach VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.vsix_name }}
          overwrite_files: true
