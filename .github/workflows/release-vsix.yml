name: Release VSIX

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-vsix-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npx @vscode/vsce package

      - name: Attach VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          overwrite_files: true
